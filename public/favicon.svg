<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Wobbly Notebook Page -->
  <!-- Slightly tilted notebook card -->
  <path d="M 7 9 C 7 7.5 8.5 7 10 7 L 23 7 C 24.5 7 25 8.5 25 10 L 25 23 C 25 24.5 24.5 25 23 25 L 10 25 C 8.5 25 7 24.5 7 23 Z" fill="#f6f0dc" stroke="#1f2540" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Overlapping sketchy duplicate page outline for hand-drawn feel -->
  <path d="M 7.5 9.5 C 7.5 8.2 8.8 7.5 10 7.5 L 22.5 7.5 C 23.8 7.5 24.5 8.2 24.5 9.5 L 24.5 22.5 C 24.5 23.8 23.8 24.5 22.5 24.5 L 10 24.5 C 8.8 24.5 7.5 23.8 7.5 22.5 Z" stroke="#1f2540" stroke-width="0.8" stroke-opacity="0.3" stroke-linecap="round" />

  <!-- Horizontal line rulings on notebook paper (sketchy look) -->
  <path d="M 11 11 L 21 11" stroke="#1f2540" stroke-opacity="0.2" stroke-width="1.2" stroke-linecap="round" />
  <path d="M 11 15 L 21 15" stroke="#1f2540" stroke-opacity="0.2" stroke-width="1.2" stroke-linecap="round" />
  <path d="M 11 19 L 21 19" stroke="#1f2540" stroke-opacity="0.2" stroke-width="1.2" stroke-linecap="round" />

  <!-- A tiny blue checkmark on the page -->
  <path d="M 12 15.5 L 14.5 18 L 19.5 13" stroke="#4f6bd6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Spiral notebook rings on the left edge -->
  <path d="M 5 10 C 7 10 7 11 5 11" stroke="#1f2540" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 5 14 C 7 14 7 15 5 15" stroke="#1f2540" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 5 18 C 7 18 7 19 5 19" stroke="#1f2540" stroke-width="1.5" stroke-linecap="round" />
  <path d="M 5 22 C 7 22 7 23 5 23" stroke="#1f2540" stroke-width="1.5" stroke-linecap="round" />

  <!-- Cozy sprout growing from the bottom-right edge of the page -->
  <!-- Stem -->
  <path d="M 23 23 Q 27 21 27 16" stroke="#1f2540" stroke-width="1.8" stroke-linecap="round" />
  <!-- Left leaf -->
  <path d="M 27 16 C 24 14 23 16 23 17.5 C 24.5 18 26.5 17.5 27 16 Z" fill="#78e2b8" stroke="#1f2540" stroke-width="1.2" stroke-linejoin="round" />
  <!-- Right leaf -->
  <path d="M 27 16 C 30 14 31 16 31 17.5 C 29.5 18 27.5 17.5 27 16 Z" fill="#78e2b8" stroke="#1f2540" stroke-width="1.2" stroke-linejoin="round" />
</svg>
